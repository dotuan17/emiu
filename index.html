<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <title>Nhâm Mì 27-04 ❤️ | This is for you</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Nhâm Mì | This is for you 😘</title>
  </head>
  <body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="envelope.png" alt="Envelope" id="envelope" />
      <img src="https://i.pinimg.com/736x/01/90/c9/0190c99fc55b9d13120bd354a16c01e1.jpg" alt="Mì" id="emiu" />
      <p>♡ Letter for Mì ♡</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">Mì đồng ý làm người yêu anh nhé ?</h1>

        <img src="cat_heart.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="yes.png" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="no.png" class="btn no-btn" alt="No" />
          </div>
        </div>

        <p id="final-text" class="final-text" style="display: none">
          <strong>Gớm:</strong> Thích người ta rồi chứ gì!
        </p>
      </div>
    </div>

    <!-- Emiu Letter Screen -->
    <div id="emiu-letter-container">
      <div class="emiu-letter-window">
        <!-- Heart decoration -->
        <div class="heart-decoration">
          <img src="emiu.jpg" class="heart-img" style="top: 0; left: 50%; transform: translateX(-50%);" alt="❤️">
          <img src="emiu2.png" class="heart-img" style="top: 8%; left: 25%; transform: rotate(-30deg);" alt="❤️">
          <img src="emiu3.png" class="heart-img" style="top: 8%; right: 25%; transform: rotate(30deg);" alt="❤️">
          <img src="emiu4.png" class="heart-img" style="top: 20%; left: 10%; transform: rotate(-50deg);" alt="❤️">
          <img src="emiu5.png" class="heart-img" style="top: 20%; right: 10%; transform: rotate(50deg);" alt="❤️">
          <img src="emiu.jpg" class="heart-img" style="top: 35%; left: 3%; transform: rotate(-70deg);" alt="❤️">
          <img src="emiu.jpg" class="heart-img" style="top: 35%; right: 3%; transform: rotate(70deg);" alt="❤️">
        </div>

        <!-- Close button -->
        <button class="close-btn">&times;</button>

        <!-- Letter content -->
        <div class="emiu-letter-content">
          <h2>Gửi Mì 💕</h2>
          <div class="love-letter">
            <p class="poem">
              Anh có thể làm mọi thứ trên người em ướt,<br>
              Trừ đôi mắt của em.<br>
              Trong tim anh chỉ có em,<br>
              Mãi mãi không phai nhòa.
            </p>
            <p class="signature">
              - Anh yêu Mì -
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
